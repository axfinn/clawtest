# pytest.ini - 测试配置

[pytest]
# 测试目录
testpaths = tests

# Python 文件匹配模式
python_files = test_*.py

# 测试类匹配模式
python_classes = Test*

# 测试函数匹配模式
python_functions = test_*

# 添加自定义标记
markers =
    unit: 单元测试
    integration: 集成测试
    api: API 测试
    slow: 慢速测试

# 最小 Python 版本
minversion = 6.0

# 输出选项
addopts =
    -v
    --strict-markers
    --tb=short
    --disable-warnings
    -p no:cacheprovider

# 覆盖率配置
[coverage:run]
source = src
omit =
    */tests/*
    */test_*.py
    */__pycache__/*
    */venv/*
    */env/*

[coverage:report]
precision = 2
show_missing = True
skip_covered = False

[coverage:html]
directory = htmlcov
